name: Sync Strava activities

on:
  schedule:
    # 19:30 UTC daily = 21:30 Oslo sommertid / 20:30 Oslo vintertid.
    # GitHub runs cron in UTC; drift of a few minutes under load is normal.
    - cron: "30 19 * * *"
  workflow_dispatch:  # allow manual triggering from the Actions tab

permissions:
  contents: write  # we commit the updated data/ back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-strava-${{ matrix.user_slug }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - user_slug: pal
            client_id_secret: STRAVA_CLIENT_ID_PAL
            client_secret_secret: STRAVA_CLIENT_SECRET_PAL
            refresh_token_secret: STRAVA_REFRESH_TOKEN_PAL
          - user_slug: karin_annette
            client_id_secret: STRAVA_CLIENT_ID_KARIN_ANNETTE
            client_secret_secret: STRAVA_CLIENT_SECRET_KARIN_ANNETTE
            refresh_token_secret: STRAVA_REFRESH_TOKEN_KARIN_ANNETTE
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch activities from Strava
        env:
          STRAVA_CLIENT_ID: ${{ secrets[matrix.client_id_secret] }}
          STRAVA_CLIENT_SECRET: ${{ secrets[matrix.client_secret_secret] }}
          STRAVA_REFRESH_TOKEN: ${{ secrets[matrix.refresh_token_secret] }}
          USER_SLUG: ${{ matrix.user_slug }}
        run: python scripts/fetch_activities.py

      - name: Commit any new activities
        run: |
          git config user.name  "strava-sync-bot"
          git config user.email "strava-sync-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new activities — nothing to commit."
          else
            git commit -m "Sync Strava activities – ${{ matrix.user_slug }} ($(date -u +'%Y-%m-%d'))"
            git push
          fi
