name: Sync Strava activities

on:
  schedule:
    # 05:00 UTC daily = 07:00 Oslo sommertid / 06:00 Oslo vintertid.
    # GitHub runs cron in UTC; drift of a few minutes under load is normal.
    - cron: "0 5 * * *"
  workflow_dispatch:  # allow manual triggering from the Actions tab

permissions:
  contents: write  # we commit the updated data/ back to the repo

concurrency:
  group: sync-strava
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check secrets are set
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          echo "STRAVA_CLIENT_ID length: ${#STRAVA_CLIENT_ID}"
          echo "STRAVA_CLIENT_SECRET length: ${#STRAVA_CLIENT_SECRET}"
          echo "STRAVA_REFRESH_TOKEN length: ${#STRAVA_REFRESH_TOKEN}"

      - name: Fetch activities from Strava
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python scripts/fetch_activities.py

      - name: Commit any new activities
        run: |
          git config user.name  "strava-sync-bot"
          git config user.email "strava-sync-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new activities — nothing to commit."
          else
            git commit -m "Sync Strava activities ($(date -u +'%Y-%m-%d'))"
            git push
          fi
